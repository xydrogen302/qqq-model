<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" href="favicon.ico">
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>QQQ MODEL V1.1</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: #000000;
    color: #ffffff;
    min-height: 100vh;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  .app { max-width: 1400px; margin: 0 auto; padding: 24px 16px; }
  .header { display: flex; flex-direction: column; justify-content: space-between; gap: 8px; margin-bottom: 24px; }
  .title {
    margin: 0;
    font-family: "Arial Black", Impact, Haettenschweiler, "Segoe UI Black", sans-serif;
    font-size: clamp(36px, 7vw, 72px);
    font-weight: 900;
    letter-spacing: -0.04em;
    line-height: 1.05;
  }
  .feed { font-size: 12px; color: rgba(255,255,255,0.5); align-self: flex-start; }
  .asset-row { display: flex; gap: 8px; flex-wrap: wrap; margin: -12px 0 20px; }
  .asset-btn {
    background: #000000;
    color: rgba(255,255,255,0.55);
    border: 1px solid rgba(255,255,255,0.10);
    padding: 8px 12px;
    font-family: inherit;
    font-size: 11px;
    letter-spacing: 0.4px;
    cursor: pointer;
  }
  .asset-btn.active { color: #ffffff; background: rgba(255,255,255,0.08); }
  .grid-top { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 16px; margin-bottom: 24px; }
  .grid-panels { display: grid; grid-template-columns: 1fr; gap: 24px; }
  .box, .panel { border: 1px solid rgba(255,255,255,0.10); padding: 16px; background: #000000; content-visibility: auto; contain-intrinsic-size: 120px; }
  .box-label, .panel-title { font-size: 12px; color: rgba(255,255,255,0.40); }
  .box-label { margin-bottom: 4px; }
  .panel-title { margin-bottom: 12px; }
  .box-value { font-size: 18px; line-height: 1.25; }
  .box-sub { font-size: 12px; color: rgba(255,255,255,0.50); margin-top: 2px; }
  .tone { display: inline-block; padding: 2px 8px; border: 1px solid rgba(255,255,255,0.10); }
  .tone-expansion { color: rgb(110, 231, 183); border-color: rgba(16,185,129,0.30); background: rgba(16,185,129,0.10); }
  .tone-balance { color: rgb(252, 211, 77); border-color: rgba(245,158,11,0.30); background: rgba(245,158,11,0.10); }
  .tone-transition, .tone-value { color: rgb(248, 113, 113); border-color: rgba(239,68,68,0.30); background: rgba(239,68,68,0.10); }
  .row { display: flex; justify-content: space-between; gap: 12px; font-size: 14px; padding: 4px 0; }
  .row-left { color: rgba(255,255,255,0.60); }
  .row-right { color: #ffffff; text-align: right; }
  .warn { border: 1px solid rgba(245,158,11,0.35); color: rgb(252, 211, 77); padding: 10px 12px; font-size: 12px; margin-bottom: 16px; display: none; }
  @media (min-width: 640px) {
    .header { flex-direction: row; align-items: center; }
    .feed { align-self: center; padding-top: 0; }
    .title { margin: 0; }
  }
  @media (min-width: 768px) {
    .grid-top { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    .grid-panels { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  }
</style>
</head>
<body>
  <div class="app">
    <div class="header">
      <h1 class="title">QQQ MODEL V1.1</h1>
      <div class="feed" id="feedLabel">FEED READY</div>
    </div>

    <div class="asset-row">
      <button class="asset-btn" data-asset="qqqon">QQQON</button>
      <button class="asset-btn active" data-asset="qqqx">QQQX</button>
    </div>

    <div class="warn" id="warningBox"></div>

    <div class="grid-top">
      <div class="box">
        <div class="box-label">PRICE</div>
        <div class="box-value" id="priceBox">$650</div>
      </div>
      <div class="box"><div class="box-label">REGIME</div><div class="box-value"><span id="regimeBox">BALANCE</span></div></div>
      <div class="box"><div class="box-label">SIGNAL</div><div class="box-value" id="signalBox">HOLD</div></div>
      <div class="box"><div class="box-label">CONFIDENCE</div><div class="box-value" id="confidenceBox">60/100</div><div class="box-sub" id="bandBox">CONSTRUCTIVE</div></div>
      <div class="box"><div class="box-label">MONTHLY RSI (2)</div><div class="box-value" id="rsiBox">—</div><div class="box-sub" id="rsiSignalBox">WAITING</div></div>
      <div class="box"><div class="box-label">PIVOT POSITION</div><div class="box-value" id="pivotPositionBox">—</div><div class="box-sub" id="pivotPositionSubBox">—</div></div>
    </div>

    <div class="grid-panels">
      <div class="panel"><div class="panel-title">1Y PIVOT STRUCTURE</div><div id="pivotRows"></div></div>
      <div class="panel"><div class="panel-title">MODEL STATE</div><div id="stateRows"></div></div>
      <div class="panel"><div class="panel-title">ALLOCATION</div><div id="allocationRows"></div></div>
      <div class="panel"><div class="panel-title">EXECUTION</div><div id="executionRows"></div></div>
    </div>
  </div>

<script>
const CG_DEMO_API_KEY = "CG-CMkwS2X4CKH6WzUFoU6xFx21";

const ASSET_CONFIG = {
  qqqon: { label: "QQQON", coingeckoId: "invesco-qqq-etf-ondo-tokenized-etf", rsiCoingeckoId: "nasdaq-xstock", fallbackPrice: 650 },
  qqqx: { label: "QQQX", coingeckoId: "nasdaq-xstock", rsiCoingeckoId: "nasdaq-xstock", fallbackPrice: 650 },
};

const YEARLY_PIVOTS = { R2: 786, R1: 700, P: 551, S1: 465, S2: 317 };

const state = {
  price: 650,
  rsi2: null,
  rsiSignal: "WAITING",
  priceSource: "Fallback",
  feedStatus: "READY",
  assetKey: "qqqx",
  lastUpdated: null,
  warning: "",
};

let refreshTimer = null;

function format(v) { return Number(v).toLocaleString(undefined, { maximumFractionDigits: 2 }); }

function getZone(price) {
  if (price >= YEARLY_PIVOTS.R1) return "EXPANSION";
  if (price >= YEARLY_PIVOTS.P) return "BALANCE";
  if (price >= YEARLY_PIVOTS.S1) return "TRANSITION";
  return "VALUE";
}

function getSignal(price) {
  if (price <= YEARLY_PIVOTS.S1) return "BUY";
  if (price >= YEARLY_PIVOTS.R1) return "TRIM";
  return "HOLD";
}

function getConfidence(price) {
  let s = 50;
  if (price >= YEARLY_PIVOTS.R1) s += 25;
  else if (price >= YEARLY_PIVOTS.P) s += 10;
  else if (price <= YEARLY_PIVOTS.S1) s -= 15;
  return Math.max(0, Math.min(100, s));
}

function getBand(score) {
  if (score >= 80) return "HIGH";
  if (score >= 60) return "CONSTRUCTIVE";
  if (score >= 40) return "NEUTRAL";
  return "LOW";
}


function calcRsi(values, period = 2) {
  if (!Array.isArray(values) || values.length < period + 1) return null;
  let gains = 0, losses = 0;
  for (let i = 1; i <= period; i++) {
    const diff = values[i] - values[i - 1];
    if (diff >= 0) gains += diff; else losses -= diff;
  }
  let avgGain = gains / period;
  let avgLoss = losses / period;
  for (let i = period + 1; i < values.length; i++) {
    const diff = values[i] - values[i - 1];
    const gain = diff > 0 ? diff : 0;
    const loss = diff < 0 ? -diff : 0;
    avgGain = (avgGain * (period - 1) + gain) / period;
    avgLoss = (avgLoss * (period - 1) + loss) / period;
  }
  if (avgLoss === 0) return 100;
  const rs = avgGain / avgLoss;
  return 100 - 100 / (1 + rs);
}

function getRsiSignal(rsi2, price) {
  if (!Number.isFinite(rsi2)) return "WAITING";
  const belowPivot = price <= YEARLY_PIVOTS.P;
  if (belowPivot && rsi2 < 5) return "FOUNDATION BUY";
  if (belowPivot && rsi2 < 10) return "HIGH-CONVICTION BUY";
  if (belowPivot && rsi2 < 15) return "STRONG BUY";
  if (belowPivot && rsi2 < 20) return "BUY";
  if (rsi2 < 5) return "EXTREME OVERSOLD";
  if (rsi2 < 10) return "SEVERE OVERSOLD";
  if (rsi2 < 15) return "DEEP OVERSOLD";
  if (rsi2 < 20) return "OVERSOLD";
  return "NO BUY SIGNAL";
}

function getAllocation(price) {
  if (price <= YEARLY_PIVOTS.S1) return { core: 40, dry: 60 };
  if (price <= YEARLY_PIVOTS.P) return { core: 60, dry: 40 };
  return { core: 80, dry: 20 };
}

function toneClass(zone) {
  if (zone === "EXPANSION") return "tone tone-expansion";
  if (zone === "BALANCE") return "tone tone-balance";
  if (zone === "TRANSITION") return "tone tone-transition";
  if (zone === "VALUE") return "tone tone-value";
  return "";
}

function row(left, right) {
  return `<div class="row"><span class="row-left">${left}</span><span class="row-right">${right}</span></div>`;
}

async function fetchJsonWithTimeout(url, timeoutMs = 3500) {
  const controller = new AbortController();
  const timeout = setTimeout(() => controller.abort(), timeoutMs);
  try {
    const res = await fetch(url, { signal: controller.signal, cache: "no-store" });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return await res.json();
  } finally {
    clearTimeout(timeout);
  }
}

async function fetchCoinGeckoPrice(config) {
  const id = encodeURIComponent(config.coingeckoId);
  const key = encodeURIComponent(CG_DEMO_API_KEY);

  // Demo API key via query parameter for static GitHub Pages/browser deployment.
  const url =
    `https://api.coingecko.com/api/v3/simple/price?ids=${id}&vs_currencies=usd&include_last_updated_at=true&x_cg_demo_api_key=${key}&_=${Date.now()}`;

  const data = await fetchJsonWithTimeout(url, 3500);
  const price = data && data[config.coingeckoId] && data[config.coingeckoId].usd;

  if (!Number.isFinite(price) || price <= 0) throw new Error("Invalid CoinGecko price");
  return { price, source: "CoinGecko Demo API" };
}

async function fetchCoinGeckoRsi2(config) {
  // Hard rule:
  // QQQON live price can use QQQON.
  // QQQON RSI must use QQQX history because QQQON historical market-chart data can be stale/thin/distorted.
  const selectedAsset = state.assetKey;
  const rsiIdRaw = selectedAsset === "qqqon" ? "nasdaq-xstock" : "nasdaq-xstock";
  const id = encodeURIComponent(rsiIdRaw);
  const key = encodeURIComponent(CG_DEMO_API_KEY);

  const url =
    `https://api.coingecko.com/api/v3/coins/${id}/market_chart?vs_currency=usd&days=90&interval=daily&x_cg_demo_api_key=${key}&_=${Date.now()}`;

  const data = await fetchJsonWithTimeout(url, 3500);
  const prices = Array.isArray(data && data.prices) ? data.prices : [];
  const closes = prices
    .map((p) => Array.isArray(p) ? Number(p[1]) : NaN)
    .filter((v) => Number.isFinite(v) && v > 0);

  const rsi2 = calcRsi(closes, 2);
  if (!Number.isFinite(rsi2)) throw new Error("Invalid RSI");
  return rsi2;
}

function saveCache() {
  try {
    localStorage.setItem(`qqq_model_v1_1_${state.assetKey}`, JSON.stringify({
      price: state.price,
      rsi2: state.rsi2,
      rsiSignal: state.rsiSignal,
      priceSource: state.priceSource,
      lastUpdated: state.lastUpdated
    }));
  } catch (_) {}
}

function loadCache(assetKey) {
  try {
    const raw = localStorage.getItem(`qqq_model_v1_1_${assetKey}`);
    if (!raw) return false;
    const cached = JSON.parse(raw);
    if (!cached || !Number.isFinite(cached.price)) return false;
    state.price = cached.price;
    if (assetKey !== "qqqon") {
      state.rsi2 = Number.isFinite(cached.rsi2) ? cached.rsi2 : state.rsi2;
      state.rsiSignal = cached.rsiSignal || state.rsiSignal;
    }
    state.priceSource = cached.priceSource || "Cached";
    state.lastUpdated = cached.lastUpdated || null;
    return true;
  } catch (_) {
    return false;
  }
}

async function refreshPrice() {
  try {
    state.feedStatus = "UPDATING";
    state.warning = "";
    render();

    const config = ASSET_CONFIG[state.assetKey];
    const live = await fetchCoinGeckoPrice(config);

    state.price = live.price;
    state.priceSource = live.source;
    state.feedStatus = "LIVE";
    state.lastUpdated = Date.now();
    state.warning = "";

    try {
      state.rsi2 = await fetchCoinGeckoRsi2(config);
      state.rsiSignal = getRsiSignal(state.rsi2, state.price);
    } catch (_) {
      state.rsi2 = null;
      state.rsiSignal = "RSI UNAVAILABLE";
    }

    saveCache();
  } catch (err) {
    const usedCache = loadCache(state.assetKey);
    if (usedCache) {
      state.feedStatus = "CACHED";
      state.warning = "CoinGecko Demo API unavailable. Showing cached last successful price.";
    } else {
      const config = ASSET_CONFIG[state.assetKey];
      state.price = config.fallbackPrice;
      state.priceSource = "Fallback";
      state.feedStatus = "FALLBACK";
      state.warning = "CoinGecko Demo API unavailable. Showing fallback price.";
    }
    state.rsiSignal = Number.isFinite(state.rsi2) ? getRsiSignal(state.rsi2, state.price) : "RSI UNAVAILABLE";
  } finally {
    render();
  }
}

function setAsset(assetKey) {
  if (!ASSET_CONFIG[assetKey]) return;
  state.assetKey = assetKey;
  state.rsi2 = null;
  state.rsiSignal = "WAITING";
  loadCache(assetKey);

  document.querySelectorAll(".asset-btn").forEach((btn) => {
    btn.classList.toggle("active", btn.dataset.asset === assetKey);
  });

  render();
  refreshPrice();
}


function getPivotPosition(price) {
  if (price >= YEARLY_PIVOTS.R2) return "R2+";
  if (price >= YEARLY_PIVOTS.R1) return "R1–R2";
  if (price >= YEARLY_PIVOTS.P) return "P–R1";
  if (price >= YEARLY_PIVOTS.S1) return "S1–P";
  if (price >= YEARLY_PIVOTS.S2) return "S2–S1";
  return "<S2";
}

function getPivotPositionSub(price) {
  if (price >= YEARLY_PIVOTS.R1) return "EXPANSION ZONE";
  if (price >= YEARLY_PIVOTS.P) return "ABOVE FAIR VALUE";
  if (price >= YEARLY_PIVOTS.S1) return "BELOW FAIR VALUE";
  return "VALUE ZONE";
}

function render() {
  const zone = getZone(state.price);
  let signal = getSignal(state.price);
  if (state.price < YEARLY_PIVOTS.R1 && Number.isFinite(state.rsi2) && state.price <= YEARLY_PIVOTS.P) {
    if (state.rsi2 < 5) signal = "FOUNDATION BUY";
    else if (state.rsi2 < 10) signal = "HIGH-CONVICTION BUY";
    else if (state.rsi2 < 15) signal = "STRONG BUY";
    else if (state.rsi2 < 20) signal = "BUY";
  }
  const confidence = getConfidence(state.price);
  const band = getBand(confidence);
  const allocation = getAllocation(state.price);

  document.getElementById("feedLabel").textContent =
    `FEED ${state.feedStatus}${state.lastUpdated ? " " + new Date(state.lastUpdated).toLocaleTimeString() : ""}`;

  const warningBox = document.getElementById("warningBox");
  if (state.warning) {
    warningBox.textContent = state.warning;
    warningBox.style.display = "block";
  } else {
    warningBox.textContent = "";
    warningBox.style.display = "none";
  }

  document.getElementById("priceBox").textContent = `$${format(state.price)}`;
  const regimeBox = document.getElementById("regimeBox");
  regimeBox.textContent = zone;
  regimeBox.className = toneClass(zone);

  document.getElementById("signalBox").textContent = signal;
  document.getElementById("confidenceBox").textContent = `${confidence}/100`;
  document.getElementById("bandBox").textContent = band;
  document.getElementById("rsiBox").textContent = Number.isFinite(state.rsi2) ? state.rsi2.toFixed(2) : "—";
  document.getElementById("rsiSignalBox").textContent = state.rsiSignal || "WAITING";
  document.getElementById("pivotPositionBox").textContent = getPivotPosition(state.price);
  document.getElementById("pivotPositionSubBox").textContent = getPivotPositionSub(state.price);

  document.getElementById("pivotRows").innerHTML = Object.entries(YEARLY_PIVOTS)
    .map(([k, v]) => row(k, `$${format(v)}`)).join("");

  document.getElementById("stateRows").innerHTML = [
    row("ASSET", ASSET_CONFIG[state.assetKey].label),
    row("REGIME", zone),
    row("PRIMARY SIGNAL", signal),
    row("PIVOT POSITION", getPivotPosition(state.price)),
    row("MONTHLY RSI (2)", Number.isFinite(state.rsi2) ? state.rsi2.toFixed(2) : "—"),
    row("RSI SOURCE", ASSET_CONFIG[state.assetKey].rsiCoingeckoId === ASSET_CONFIG[state.assetKey].coingeckoId ? ASSET_CONFIG[state.assetKey].label : "QQQX BENCHMARK"),
    row("RSI BUY SIGNAL", state.rsiSignal || "WAITING"),
    row("CONFIDENCE", `${confidence}/100`),
    row("BAND", band),
  ].join("");

  document.getElementById("allocationRows").innerHTML = [
    row("CORE", `${allocation.core}%`),
    row("DRY POWDER", `${allocation.dry}%`),
  ].join("");

  document.getElementById("executionRows").innerHTML = [
    row("BUY ZONE", `$${format(YEARLY_PIVOTS.S1)}`),
    row("FAIR VALUE", `$${format(YEARLY_PIVOTS.P)}`),
    row("TRIM", `$${format(YEARLY_PIVOTS.R1)}`),
  ].join("");
}

document.querySelectorAll(".asset-btn").forEach((btn) => {
  btn.addEventListener("click", () => setAsset(btn.dataset.asset));
});

loadCache(state.assetKey);
render();

// Fast first paint: show cached/fallback data immediately, then update live in the background.
setTimeout(refreshPrice, 1200);

// Lighter auto-refresh for mobile/GitHub Pages.
refreshTimer = setInterval(refreshPrice, 120000);
</script>
</body>
</html>
